version: "3.8"
services:
  db:
    build: .
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password # Rootユーザーのパスワード（必須）
      MYSQL_DATABASE: my_database # 初期作成するデータベース名（任意）
      MYSQL_USER: dev_user # 一般ユーザー名（任意）
      MYSQL_PASSWORD: dev_password # 一般ユーザーのパスワード（任意）
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
